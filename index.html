<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sua Notícia 365 | Moçambique</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Tema Vermelho */
            --primary: #dc2626; 
            --primary-dark: #991b1b;
            
            /* Cores Modo Claro (Padrão) */
            --bg: #fdfdfc;
            --card: #ffffff;
            --text: #111827;
            --text-meta: #6b7280;
            --border: #e5e7eb;
            --surface: #f3f4f6;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        /* Cores Modo Escuro */
        body.dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f3f4f6;
            --text-meta: #9ca3af;
            --border: #334155;
            --surface: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; transition: background 0.3s, color 0.3s; }
        
        /* MENU LATERAL (SIDEBAR) */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1999; display: none; opacity: 0; transition: 0.3s; }
        .sidebar-overlay.open { display: block; opacity: 1; }
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: var(--card); z-index: 2000; transition: left 0.3s ease; padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-close { background: none; border: none; font-size: 1.5rem; color: var(--text); cursor: pointer; float: right; }
        .sidebar h2 { margin-top: 10px; font-size: 1.5rem; font-weight: 800; color: var(--text); }
        .sidebar h2 span { color: var(--primary); }
        .sidebar-section { margin-top: 30px; }
        .sidebar-section h3 { font-size: 0.85rem; color: var(--text-meta); text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .side-btn { display: flex; align-items: center; gap: 10px; width: 100%; background: none; border: none; color: var(--text); padding: 12px 10px; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.2s; text-align: left; }
        .side-btn:hover, .side-btn.active { background: var(--surface); color: var(--primary); }

        /* NAVEGAÇÃO TOPO */
        .navbar { position: sticky; top: 0; background: rgba(var(--bg), 0.95); backdrop-filter: blur(15px); z-index: 1000; padding: 14px 20px; border-bottom: 1px solid var(--border); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { background: none; border: none; font-size: 1.5rem; color: var(--text); cursor: pointer; }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--text); text-decoration: none; letter-spacing: -1px; cursor: pointer; }
        .logo span { color: var(--primary); }

        /* FEED E PESQUISA */
        #home-view { display: block; }
        .search-bar { margin: 16px auto; max-width: 800px; position: relative; padding: 0 20px; }
        .search-bar input { width: 100%; padding: 14px 18px 14px 48px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: inherit; }
        .search-bar i { position: absolute; left: 38px; top: 50%; transform: translateY(-50%); color: var(--text-meta); }
        
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-item { padding: 8px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; font-size: 0.85rem; font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .cat-item.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        
        .feed { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; min-height: 50vh; }
        .news-card { background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .news-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .news-img { width: 100%; height: 200px; object-fit: cover; background: var(--surface); }
        .news-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .news-tag { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; }
        .news-title { font-size: 1.1rem; font-weight: 700; line-height: 1.4; margin-bottom: 15px; }
        .news-meta { font-size: 0.8rem; color: var(--text-meta); margin-top: auto; }

        /* LEITURA DE ARTIGO */
        #article-view { display: none; background: var(--bg); min-height: 100vh; }
        .article-header { position: sticky; top: 0; width: 100%; background: rgba(var(--bg), 0.9); backdrop-filter: blur(12px); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .back-btn { background: none; border: none; font-size: 1.1rem; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; font-family: inherit; }
        
        .article-container { max-width: 740px; margin: 30px auto 0; padding: 20px; }
        .source-label { color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 15px; display: inline-block; background: rgba(220, 38, 38, 0.1); padding: 5px 12px; border-radius: 6px; }
        .article-title { font-size: 2.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 25px; letter-spacing: -1px; }
        
        /* Botões de Ação Profissionais */
        .btn-action-row { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn-action { flex: 1; min-width: 120px; border: 1px solid var(--border); padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; background: var(--card); color: var(--text); font-family: inherit; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-action:hover { background: var(--surface); }
        .btn-action.saved { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-action.liked { color: #e11d48; border-color: #e11d48; background: rgba(225, 29, 72, 0.1); }

        .article-main-img { width: 100%; border-radius: var(--radius-lg); margin-bottom: 30px; object-fit: cover; }
        .article-content { font-family: 'Lora', serif; font-size: 1.25rem; line-height: 1.8; color: var(--text); }
        .article-content img { max-width: 100%; height: auto; border-radius: var(--radius-md); margin: 20px 0; }
        .article-content p { margin-bottom: 1.5rem; }
        
        /* Secção Relacionados */
        .related-section { margin-top: 50px; border-top: 2px solid var(--border); padding-top: 30px; }
        .related-section h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .related-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; display: flex; flex-direction: column; }
        .related-card img { width: 100%; height: 120px; object-fit: cover; }
        .related-card h4 { padding: 12px; font-size: 0.95rem; line-height: 1.3; font-weight: 700; }

        footer { margin-top: 60px; padding: 40px 20px; text-align: center; border-top: 1px solid var(--border); font-size: 0.95rem; color: var(--text-meta); line-height: 1.6; }
        .loader { text-align: center; padding: 40px; grid-column: 1/-1; color: var(--primary); font-size: 1.8rem; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    <h2>Sua Notícia <span>365</span></h2>

    <div class="sidebar-section">
        <h3><i class="fas fa-cog"></i> Configurações</h3>
        <button class="side-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i> Modo Escuro</button>
    </div>

    <div class="sidebar-section">
        <h3><i class="fas fa-sort"></i> Ordenar Notícias</h3>
        <button class="side-btn active" id="btn-sort-new" onclick="setSort('new')"><i class="fas fa-clock"></i> Mais Recentes</button>
        <button class="side-btn" id="btn-sort-old" onclick="setSort('old')"><i class="fas fa-history"></i> Mais Antigas</button>
    </div>

    <div class="sidebar-section">
        <h3><i class="fas fa-folder"></i> A Minha Área</h3>
        <button class="side-btn" id="sidebar-saved-btn" onclick="toggleSavedView()"><i class="fas fa-bookmark"></i> Ler Mais Tarde</button>
    </div>
</div>

<div id="home-view">
    <nav class="navbar">
        <div class="nav-top">
            <div class="logo-area">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="logo" onclick="resetAndLoad()">Sua Notícia<span>365</span></div>
            </div>
        </div>
    </nav>
    
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Pesquisar em todos os jornais..." onkeyup="if(event.key==='Enter') resetAndLoad()">
    </div>
    <div class="categories">
        <div class="cat-item active" onclick="filterCat('', this)">Todas</div>
        <div class="cat-item" onclick="filterCat('política', this)">Política</div>
        <div class="cat-item" onclick="filterCat('economia', this)">Economia</div>
        <div class="cat-item" onclick="filterCat('sociedade', this)">Sociedade</div>
        <div class="cat-item" onclick="filterCat('desporto', this)">Desporto</div>
    </div>

    <main class="feed" id="feed"></main>
    <div id="scroll-anchor" class="loader"><i class="fas fa-circle-notch fa-spin"></i> A processar jornais...</div>
</div>

<div id="article-view">
    <div class="article-header">
        <button class="back-btn" onclick="closeArticle()"><i class="fas fa-arrow-left"></i> Voltar</button>
    </div>

    <main class="article-container">
        <div id="source-tag" class="source-label">...</div>
        <h1 id="article-title">...</h1>
        
        <div class="btn-action-row">
            <button id="btn-like" class="btn-action" onclick="toggleLike()"><i class="far fa-heart"></i> Adorar</button>
            <button id="btn-save" class="btn-action" onclick="toggleSaveArticle()"><i class="far fa-bookmark"></i> Guardar</button>
            <button class="btn-action" onclick="shareArticle()"><i class="fas fa-share-alt"></i> Partilhar</button>
        </div>

        <img id="feat-img" class="article-main-img" src="" style="display:none">
        <div id="article-content" class="article-content"><i class="fas fa-spinner fa-spin"></i> A carregar texto completo...</div>
        
        <div class="related-section" id="related-section" style="display:none;">
            <h3>Notícias Relacionadas</h3>
            <div class="related-grid" id="related-grid"></div>
        </div>

        <footer>
            <strong>Sua Notícia 365</strong><br>
            Feito por Donaldo Fernando Rodrigues
        </footer>
    </main>
</div>

<script>
// LISTA DE FONTES (Mantemos todas, as que falharem não quebram o site)
const SOURCES = [
    { name: "O País", api: "https://opais.co.mz/wp-json/wp/v2/posts?_embed", slug: "opais" },
    { name: "Carta de MZ", api: "https://cartamz.com/wp-json/wp/v2/posts?_embed", slug: "carta" },
    { name: "MZ News", api: "https://mznews.co.mz/wp-json/wp/v2/posts?_embed", slug: "mznews" },
    { name: "Folha de Maputo", api: "https://www.folhademaputo.co.mz/wp-json/wp/v2/posts?_embed", slug: "folha" },
    { name: "Evidências", api: "https://evidencias.co.mz/wp-json/wp/v2/posts?_embed", slug: "evidencias" },
    { name: "Integrity", api: "https://integritymag.co.mz/wp-json/wp/v2/posts?_embed", slug: "integrity" },
    { name: "Mais de MZ", api: "https://mais.co.mz/wp-json/wp/v2/posts?_embed", slug: "mais" },
    { name: "Jornal Ikweli", api: "https://www.jornalikweli.co.mz/wp-json/wp/v2/posts?_embed", slug: "ikweli" },
    { name: "Mozambique Times", api: "https://mozambiquetimes.co.mz/wp-json/wp/v2/posts?_embed", slug: "moztimes" },
    { name: "MMO Notícias", api: "https://noticias.mmo.co.mz/wp-json/wp/v2/posts?_embed", slug: "mmo" },
    { name: "Jornal Domingo", api: "https://www.jornaldomingo.co.mz/wp-json/wp/v2/posts?_embed", slug: "domingo" },
    { name: "SAVANA", api: "https://savana.co.mz/wp-json/wp/v2/posts?_embed", slug: "savana" }
];

let allPosts = [], currentPage = 1, isFetching = false, currentCat = '', isSavedView = false, sortOrder = 'new';
let currentReadingPost = null;

// LÓGICA DO MENU E TEMA
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
}

function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    const icon = document.getElementById('theme-icon');
    icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
}

function setSort(order) {
    sortOrder = order;
    document.getElementById('btn-sort-new').classList.toggle('active', order === 'new');
    document.getElementById('btn-sort-old').classList.toggle('active', order === 'old');
    toggleSidebar();
    renderFeed();
}

// LÓGICA DO FEED
async function loadNews() {
    if (isFetching || isSavedView) return;
    isFetching = true;
    
    const query = currentCat || document.getElementById('search-input').value;

    const fetchPromises = SOURCES.map(async (src) => {
        try {
            let url = `${src.api}&per_page=3&page=${currentPage}`;
            if (query) url += `&search=${encodeURIComponent(query)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Falha');
            const data = await res.json();
            
            return data.map(p => ({
                id: String(p.id), // Forçar string para facilitar comparações
                title: p.title.rendered, 
                date: p.date, 
                srcName: src.name, 
                srcSlug: src.slug,
                apiBase: src.api.split('?')[0],
                img: p._embedded?.['wp:featuredmedia']?.[0]?.source_url || 'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?q=80&w=600'
            }));
        } catch (e) { return []; }
    });

    const results = await Promise.all(fetchPromises);
    const newPosts = results.flat();
    allPosts = [...allPosts, ...newPosts];
    renderFeed();
    isFetching = false;
    currentPage++;
}

function renderFeed() {
    const feed = document.getElementById('feed');
    feed.innerHTML = ''; // Limpar para reordenar corretamente
    
    let displayList = isSavedView ? JSON.parse(localStorage.getItem('news_saved') || '[]') : [...allPosts];
    
    // Aplica a ordenação
    if(sortOrder === 'new') {
        displayList.sort((a, b) => new Date(b.date) - new Date(a.date));
    } else {
        displayList.sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    
    displayList.forEach(p => {
        const card = document.createElement('div');
        card.className = 'news-card';
        card.onclick = () => openArticle(p);
        card.innerHTML = `
            <img class="news-img" src="${p.img}" loading="lazy">
            <div class="news-body">
                <span class="news-tag">${p.srcName}</span>
                <h3 class="news-title">${p.title}</h3>
                <div class="news-meta"><span><i class="far fa-clock"></i> ${new Date(p.date).toLocaleDateString()}</span></div>
            </div>`;
        feed.appendChild(card);
    });
}

function filterCat(cat, btn) {
    document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    isSavedView = false;
    resetAndLoad();
}

function toggleSavedView() {
    isSavedView = !isSavedView;
    const btn = document.getElementById('sidebar-saved-btn');
    btn.classList.toggle('active', isSavedView);
    document.getElementById('scroll-anchor').style.display = isSavedView ? 'none' : 'block';
    toggleSidebar();
    if(isSavedView && currentReadingPost) closeArticle();
    renderFeed();
}

function resetAndLoad() { allPosts = []; currentPage = 1; loadNews(); }

// LÓGICA DO ARTIGO E RELACIONADOS
async function openArticle(post) {
    currentReadingPost = post;
    
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('article-view').style.display = 'block';
    window.scrollTo(0, 0);

    document.getElementById('source-tag').innerText = post.srcName;
    document.getElementById('article-title').innerHTML = post.title;
    document.getElementById('article-content').innerHTML = '<i class="fas fa-spinner fa-spin"></i> A carregar texto completo...';
    
    const img = document.getElementById('feat-img');
    if (post.img && !post.img.includes('unsplash')) {
        img.src = post.img;
        img.style.display = 'block';
    } else { img.style.display = 'none'; }

    updateActionBtns();
    renderRelatedPosts(post);

    try {
        const res = await fetch(`${post.apiBase}/${post.id}?_embed`);
        const p = await res.json();
        document.getElementById('article-content').innerHTML = p.content.rendered;
    } catch(e) { 
        document.getElementById('article-content').innerHTML = "Texto não disponível. Tente outra notícia."; 
    }
}

function closeArticle() {
    document.getElementById('article-view').style.display = 'none';
    document.getElementById('home-view').style.display = 'block';
    document.getElementById('article-content').innerHTML = ''; 
    currentReadingPost = null;
    if(isSavedView) renderFeed(); 
}

// LÓGICA DE BOTÕES: GUARDAR, ADORAR E PARTILHAR
function toggleSaveArticle() {
    if(!currentReadingPost) return;
    let saved = JSON.parse(localStorage.getItem('news_saved') || '[]');
    const idx = saved.findIndex(x => x.id === currentReadingPost.id);
    idx > -1 ? saved.splice(idx, 1) : saved.push(currentReadingPost);
    localStorage.setItem('news_saved', JSON.stringify(saved));
    updateActionBtns();
}

function toggleLike() {
    if(!currentReadingPost) return;
    let liked = JSON.parse(localStorage.getItem('news_liked') || '[]');
    const idx = liked.findIndex(id => id === currentReadingPost.id);
    idx > -1 ? liked.splice(idx, 1) : liked.push(currentReadingPost.id);
    localStorage.setItem('news_liked', JSON.stringify(liked));
    updateActionBtns();
}

function updateActionBtns() {
    if(!currentReadingPost) return;
    
    // Botão Guardar
    const saved = JSON.parse(localStorage.getItem('news_saved') || '[]');
    const isSaved = saved.some(x => x.id === currentReadingPost.id);
    const btnSave = document.getElementById('btn-save');
    btnSave.classList.toggle('saved', isSaved);
    btnSave.innerHTML = isSaved ? '<i class="fas fa-bookmark"></i> Guardada' : '<i class="far fa-bookmark"></i> Guardar';

    // Botão Adorar
    const liked = JSON.parse(localStorage.getItem('news_liked') || '[]');
    const isLiked = liked.includes(currentReadingPost.id);
    const btnLike = document.getElementById('btn-like');
    btnLike.classList.toggle('liked', isLiked);
    btnLike.innerHTML = isLiked ? '<i class="fas fa-heart"></i> Adorado' : '<i class="far fa-heart"></i> Adorar';
}

function shareArticle() { 
    if (navigator.share && currentReadingPost) {
        navigator.share({ title: currentReadingPost.title, url: location.href }); 
    } else { alert("Link pronto a partilhar!"); }
}

// NOTÍCIAS RELACIONADAS
function renderRelatedPosts(currentPost) {
    const section = document.getElementById('related-section');
    const grid = document.getElementById('related-grid');
    
    // Filtra notícias da mesma fonte (jornal), excluindo a que estamos a ler
    let related = allPosts.filter(p => p.srcSlug === currentPost.srcSlug && p.id !== currentPost.id).slice(0, 4);
    
    if(related.length > 0) {
        grid.innerHTML = related.map(p => `
            <div class="related-card" onclick="openRelated('${p.id}')">
                <img src="${p.img}" loading="lazy">
                <h4>${p.title}</h4>
            </div>
        `).join('');
        section.style.display = 'block';
    } else {
        section.style.display = 'none';
    }
}

// Função auxiliar para abrir artigo a partir dos relacionados
function openRelated(id) {
    const post = allPosts.find(p => p.id === id);
    if(post) { window.scrollTo(0,0); openArticle(post); }
}

const observer = new IntersectionObserver(e => e[0].isIntersecting && loadNews());
observer.observe(document.getElementById('scroll-anchor'));
window.onload = loadNews;
</script>
</body>
</html>
